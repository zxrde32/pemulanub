doctype <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #000;
    font-family: Arial, sans-serif;
  }

  h1 {
    position: absolute;
    width: 100%;
    text-align: center;
    top: 35%;
    color: white;
    font-size: 40px;
    z-index: 2;
    transition: 0.3s;
  }

  .btn {
    position: absolute;
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 25px;
    color: white;
    cursor: pointer;
    z-index: 2;
    transition: 0.2s;
  }

  #yesBtn {
    background: #ff4d6d;
    top: 50%;
    left: 40%;
  }

  #noBtn {
    background: #555;
    top: 50%;
    left: 55%;
  }

  .heart {
    position: absolute;
    width: 20px;
    height: 20px;
    transform: rotate(45deg);
    background: red;
  }

  .heart::before,
  .heart::after {
    content: "";
    position: absolute;
    width: 20px;
    height: 20px;
    background: red;
    border-radius: 50%;
  }

  .heart::before {
    top: -10px;
    left: 0;
  }

  .heart::after {
    left: -10px;
    top: 0;
  }
</style>
</head>
<body>

<h1 id="text">do you love me? ❤️</h1>

<button id="yesBtn" class="btn">sayang 💘</button>
<button id="noBtn" class="btn">engga 😢</button>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const text = document.getElementById("text");

let scale = 1;

// tombol NO kabur saat didekati
noBtn.addEventListener("mouseover", () => {
  const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
  const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";

  // bikin tombol YES makin gede tiap gagal klik NO
  scale += 0.1;
  yesBtn.style.transform = `scale(${scale})`;
});

// klik YES
yesBtn.addEventListener("click", () => {
  text.innerText = "I love you too ❤️";
  yesBtn.style.display = "none";
  noBtn.style.display = "none";

  startHearts();
});

// animasi hati
let hearts = [];

function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");

  heart.style.left = Math.random() * window.innerWidth + "px";
  heart.style.top = window.innerHeight + "px";
  heart.style.opacity = Math.random();

  document.body.appendChild(heart);
  hearts.push(heart);
}

function animateHearts() {
  hearts.forEach((heart, i) => {
    let top = parseFloat(heart.style.top);
    heart.style.top = (top - 2) + "px";

    if (top < -20) {
      heart.remove();
      hearts.splice(i, 1);
    }
  });
}

setInterval(animateHearts, 16);

function startHearts() {
  setInterval(() => {
    for (let i = 0; i < 6; i++) {
      createHeart();
    }
  }, 200);
}
</script>

</body>
</html>
